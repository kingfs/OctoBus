name: docker

on:
  pull_request:
    paths:
      - .github/workflows/docker.yml
      - docker/**
      - cmd/**
      - internal/**
      - scripts/build-octobus.sh
      - go.mod
      - go.sum
  push:
    branches:
      - main
    tags:
      - v*

permissions:
  contents: read

env:
  IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'chaitin/octobus' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set build metadata
        id: metadata
        run: |
          echo "commit=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERIO_USERNAME }}
          password: ${{ secrets.DOCKERIO_PASSWORD }}

      - name: Build
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            OCTOBUS_VERSION=${{ github.ref_name }}
            OCTOBUS_COMMIT=${{ steps.metadata.outputs.commit }}
            OCTOBUS_BUILD_DATE=${{ steps.metadata.outputs.date }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            OCTOBUS_VERSION=${{ github.ref_name }}
            OCTOBUS_COMMIT=${{ steps.metadata.outputs.commit }}
            OCTOBUS_BUILD_DATE=${{ steps.metadata.outputs.date }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
