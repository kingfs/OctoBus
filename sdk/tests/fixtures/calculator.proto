syntax = "proto3";

package calculator.v1;

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/field_mask.proto";
import "google/protobuf/wrappers.proto";

service CalculatorService {
  rpc Add(BinaryOperationRequest) returns (CalculatorResponse);
  rpc Subtract(BinaryOperationRequest) returns (CalculatorResponse);
  rpc EchoContract(ContractRequest) returns (ContractResponse);
  rpc JsonShape(JsonShapeRequest) returns (JsonShapeResponse);
  rpc Sum(stream BinaryOperationRequest) returns (CalculatorResponse);
  rpc Watch(BinaryOperationRequest) returns (stream CalculatorResponse);
  rpc Chat(stream BinaryOperationRequest) returns (stream CalculatorResponse);
}

message BinaryOperationRequest {
  double left = 1;
  double right = 2;
}

message CalculatorResponse {
  double result = 1;
}

message ContractRequest {
  int32 count = 1;
  int64 big_count = 2;
  repeated int32 numbers = 3;
  google.protobuf.Value payload = 4;
  map<string, string> extra_fields = 5 [json_name = "extraFields"];
}

message ContractResponse {
  int32 http_status_code = 1;
  google.protobuf.Value http_response = 2;
  google.protobuf.Struct object = 3;
  google.protobuf.ListValue list = 4;
}

enum JsonShapeStatus {
  JSON_SHAPE_STATUS_UNSPECIFIED = 0;
  JSON_SHAPE_STATUS_READY = 1;
}

message JsonShapeRequest {
  string request_id = 1 [json_name = "requestId"];
  NestedShape nested = 2;
}

message NestedShape {
  string child_name = 1;
}

message JsonShapeResponse {
  google.protobuf.Timestamp created_at = 1;
  google.protobuf.Duration elapsed = 2;
  google.protobuf.FieldMask mask = 3;
  google.protobuf.StringValue label = 4;
  google.protobuf.Int64Value total = 5;
  bytes raw = 6;
  JsonShapeStatus status = 7;
  map<string, string> tags = 8;
  repeated NestedShape children = 9;
  map<string, NestedShape> child_map = 10 [json_name = "childMapAlias"];
  string custom_field = 11 [json_name = "customAlias"];
}
