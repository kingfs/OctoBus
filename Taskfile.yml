version: "3"

tasks:
  default:
    desc: List all available tasks.
    silent: true
    cmds:
      - task --list-all

  all:
    desc: Run all lint, test, and build stages.
    cmds:
      - task: lint
      - task: test
      - task: build

  lint:
    desc: Run formatting and static analysis checks.
    cmds:
      - |
        unformatted="$(
          git ls-files -z --cached --others --exclude-standard -- '*.go' |
            xargs -0r gofmt -l
        )"
        if [ -n "$unformatted" ]; then
          echo "gofmt required for:"
          echo "$unformatted"
          exit 1
        fi
      - go vet ./...

  test:
    desc: Run all Go tests, including e2e tests.
    cmds:
      - task: sdk:build
      - task: example:calculator:deps
      - task: example:calculator-on-demand:deps
      - rm -rf coverage
      - mkdir -p coverage/e2e
      - bash ./scripts/test-coverage.sh
      - task: example:minimum
      - task: example:minimum-on-demand

  build:
    desc: Build the octobus binary.
    cmds:
      - bash ./scripts/build-octobus.sh bin/octobus
      - |
        if command -v ldd >/dev/null 2>&1; then
          if ldd bin/octobus 2>&1 | grep -q "not a dynamic executable"; then
            exit 0
          fi
          echo "bin/octobus is dynamically linked; expected a static binary" >&2
          ldd bin/octobus >&2
          exit 1
        fi

  npm:octobus:pack:
    desc: Build OctoBus npm binary packages and create package tarballs.
    cmds:
      - bash ./scripts/build-octobus-npm-packages.sh --pack-destination npm/dist

  clean:
    desc: Remove generated build outputs, dependency installs, and task caches.
    cmds:
      - rm -rf bin
      - rm -rf npm/octobus-*/bin npm/dist
      - rm -rf sdk/dist sdk/node_modules
      - rm -rf examples/calculator-js/node_modules
      - rm -rf examples/calculator-on-demand-js/node_modules
      - rm -rf .task coverage

  sdk:install:
    desc: Install SDK npm dependencies.
    dir: sdk
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json
    cmds:
      - npm ci

  sdk:build:
    desc: Build the local TypeScript SDK.
    deps:
      - sdk:install
    dir: sdk
    sources:
      - package.json
      - package-lock.json
      - tsconfig.json
      - src/**/*.ts
    generates:
      - dist/index.js
      - dist/index.d.ts
    cmds:
      - npm run build

  example:install-local-sdk:
    internal: true
    deps:
      - sdk:build
    requires:
      vars:
        - EXAMPLE_DIR
    cmds:
      - |
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT
        sdk_tgz="$(
          cd sdk
          npm pack --pack-destination "$tmpdir" --silent
        )"
        cd "{{.EXAMPLE_DIR}}"
        npm install --no-save --package-lock=false "$tmpdir/$sdk_tgz"

  example:calculator:deps:
    desc: Install calculator example dependencies.
    cmds:
      - task: example:install-local-sdk
        vars:
          EXAMPLE_DIR: examples/calculator-js
      - rm -rf examples/calculator-js/node_modules

  example:calculator:dev-deps:
    desc: Install calculator example dependencies for local node execution.
    cmds:
      - task: example:install-local-sdk
        vars:
          EXAMPLE_DIR: examples/calculator-js

  example:calculator-on-demand:deps:
    desc: Install on-demand calculator example dependencies.
    cmds:
      - task: example:install-local-sdk
        vars:
          EXAMPLE_DIR: examples/calculator-on-demand-js
      - rm -rf examples/calculator-on-demand-js/node_modules

  example:calculator-on-demand:dev-deps:
    desc: Install on-demand calculator example dependencies for local node execution.
    cmds:
      - task: example:install-local-sdk
        vars:
          EXAMPLE_DIR: examples/calculator-on-demand-js

  example:minimum:
    desc: Run the long-running minimum example as a smoke test.
    cmds:
      - OCTOBUS_MINIMUM_HOLD_SECONDS=0 bash ./examples/minimum.sh

  example:minimum-on-demand:
    desc: Run the on-demand minimum example as a smoke test.
    cmds:
      - OCTOBUS_MINIMUM_HOLD_SECONDS=0 bash ./examples/minimum-on-demand.sh

  example:clean-checkout-smoke:
    desc: Run a clean-checkout calculator user path smoke test.
    cmds:
      - bash ./scripts/clean-checkout-smoke.sh
