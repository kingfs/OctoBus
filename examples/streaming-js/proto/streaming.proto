syntax = "proto3";
package streaming.v1;

service StreamingService {
  rpc Echo(StreamRequest) returns (StreamResponse);
  rpc Expand(StreamRequest) returns (stream StreamResponse);
  rpc Collect(stream StreamRequest) returns (StreamResponse);
  rpc Chat(stream StreamRequest) returns (stream StreamResponse);
}

message StreamRequest {
  string text = 1;
  int32 count = 2;
}

message StreamResponse {
  string text = 1;
  int32 index = 2;
  string service_id = 3 [json_name = "serviceId"];
  string instance_id = 4 [json_name = "instanceId"];
  string label = 5;
  string business_request_id = 6 [json_name = "businessRequestId"];
  string secret_token = 7 [json_name = "secretToken"];
}
