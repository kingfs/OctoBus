syntax = "proto3";
package calculator.v1;

service CalculatorService {
  rpc Add(BinaryOperationRequest) returns (CalculatorResponse);
  rpc Subtract(BinaryOperationRequest) returns (CalculatorResponse);
}

message BinaryOperationRequest {
  double left = 1;
  double right = 2;
}

message CalculatorResponse {
  double result = 1;
  string service_id = 2 [json_name = "serviceId"];
  string instance_id = 3 [json_name = "instanceId"];
  string label = 4;
  string business_request_id = 5 [json_name = "businessRequestId"];
  string secret_token = 6 [json_name = "secretToken"];
}
