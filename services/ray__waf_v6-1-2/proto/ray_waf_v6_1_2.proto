syntax = "proto3";

package RAY_WAF_V612;

option go_package = "miner/grpc-service/RAY_WAF_V612";

service RAY_WAF_V612 {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc QueryBlacklist(QueryBlacklistRequest) returns (QueryBlacklistResponse) {}
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse) {}
  rpc UnblockIP(UnblockIPRequest) returns (UnblockIPResponse) {}
}

message LoginRequest {
  string host = 1;
  string user = 2;
  string password = 3 [deprecated = true];
}

message LoginResponse {
  bool success = 1;
  string success_raw = 2;
  string random = 3 [deprecated = true];
  string adminid = 4;
  string pwd_comp = 5;
  string pwd_lasttime = 6;
  string pwd_len = 7;
  string pwd_update_cycle = 8;
  string redirecturl = 9;
  string reminder = 10;
  string userauth = 11;
  string raw_json = 12 [deprecated = true];
}

message QueryBlacklistRequest {
  string host = 1;
  string user = 2;
  string random = 3 [deprecated = true];
}

message QueryBlacklistResponse {
  repeated BlacklistRecord records = 1;
  int64 i_total_display_records = 2;
  int64 i_total_records = 3;
  string s_echo = 4;
  string raw_json = 5;
}

message BlacklistRecord {
  string id = 1;
  string ip = 2;
  string mask = 3;
  int32 type = 4;
  int32 direction = 5;
  string remark = 6;
  repeated string extra_columns = 7;
  string raw_json = 8;
}

message BlockIPRequest {
  string host = 1;
  string user = 2;
  string random = 3 [deprecated = true];
  string ip = 4;
  string ids = 5;
  string type = 6;
  string direction = 7;
  string color = 8;
  string mask = 9;
  string remark = 10;
  string groupid = 11;
  string groupid_value = 12;
}

message BlockIPResponse {
  bool success = 1;
  string success_raw = 2;
  string id = 3;
  string errormessage = 4;
  string raw_json = 5;
}

message UnblockIPRequest {
  string host = 1;
  string user = 2;
  string random = 3 [deprecated = true];
  string ids = 4;
}

message UnblockIPResponse {
  bool success = 1;
  string success_raw = 2;
  string errormessage = 3;
  string raw_json = 4;
}
