syntax = "proto3";

package DPtech_EDS;

option go_package = "miner/grpc-service/DPtech_EDS";

service DPtech_EDS {
  rpc BatchBlockIPs(BatchBlacklistRequest) returns (BatchIPOperationResponse) {}
  rpc BatchUnblockIPs(BatchBlacklistRequest) returns (BatchIPOperationResponse) {}
}

message BatchBlacklistRequest {
  string request_id = 1;
  repeated AddressGroupTargets groups = 2;
}

message AddressGroupTargets {
  string address_group = 1;
  repeated string ip_addresses = 2;
}

message BatchIPOperationResponse {
  OperationKind operation = 1;
  repeated IPTaskResult ip_results = 2;
  int32 total_ip_count = 3;
  int32 success_ip_count = 4;
  int32 failure_ip_count = 5;
  repeated AddressGroupStat group_stats = 6;
  string request_id = 7;
}

message AddressGroupStat {
  string address_group = 1;
  int32 total_ip_count = 2;
  int32 success_ip_count = 3;
  int32 failure_ip_count = 4;
}

message IPTaskResult {
  string address_group = 1;
  string ip = 2;
  IpFamily ip_family = 3;
  IpTaskStatus status = 4;
  string failure_reason = 5;
  FailureCategory failure_category = 6;
  int32 http_status = 7;
}

enum OperationKind {
  OPERATION_KIND_UNSPECIFIED = 0;
  OPERATION_KIND_BLOCK = 1;
  OPERATION_KIND_UNBLOCK = 2;
}

enum IpFamily {
  IP_FAMILY_UNSPECIFIED = 0;
  IP_FAMILY_IPV4 = 1;
  IP_FAMILY_IPV6 = 2;
}

enum IpTaskStatus {
  IP_TASK_STATUS_UNSPECIFIED = 0;
  IP_TASK_STATUS_SUCCESS = 1;
  IP_TASK_STATUS_FAILED = 2;
}

enum FailureCategory {
  FAILURE_CATEGORY_UNSPECIFIED = 0;
  FAILURE_CATEGORY_NONE = 1;
  FAILURE_CATEGORY_INVALID_IP = 2;
  FAILURE_CATEGORY_DEVICE_REJECTED = 3;
  FAILURE_CATEGORY_UNAUTHORIZED = 4;
  FAILURE_CATEGORY_UPSTREAM_UNAVAILABLE = 5;
  FAILURE_CATEGORY_RESPONSE_REJECTED = 6;
}
