syntax = "proto3";

package HILLSTONE_FW_V55R10;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/HILLSTONE_FW_V55R10";

// HILLSTONE_FW_V55R10 exposes Hillstone Firewall V5.5R10 login and address-book HTTP APIs as unary RPCs.
service HILLSTONE_FW_V55R10 {
  // Login calls POST {host}/rest/api/login and caches the latest successful session for the given host.
  rpc Login(LoginRequest) returns (HttpResponse) {}

  // AddAddressGroup calls POST {host}/rest/api/addrbook and adds a full address-group definition.
  rpc AddAddressGroup(AddAddressGroupRequest) returns (HttpResponse) {}

  // OverwriteAddressGroup calls PUT {host}/rest/api/addrbook and overwrites the full IP set of an address group.
  rpc OverwriteAddressGroup(OverwriteAddressGroupRequest) returns (HttpResponse) {}

  // QueryAddressGroup calls GET {host}/rest/api/addrbook?query=... and returns the raw HTTP result.
  rpc QueryAddressGroup(QueryAddressGroupRequest) returns (HttpResponse) {}
}

// HttpResponse carries the upstream HTTP status code and a structured wrapper around the raw response body.
message HttpResponse {
  // http_status equals the exact upstream HTTP response status code.
  int32 http_status = 1;

  // body preserves the raw upstream body semantics for both JSON and non-JSON responses.
  HttpBody body = 2;
}

// HttpBody preserves whether the upstream body is valid JSON and carries either the parsed JSON value or the raw text.
message HttpBody {
  // is_json reports whether the original upstream body can be parsed as valid JSON.
  bool is_json = 1;

  // json_value carries the parsed JSON value when is_json is true.
  google.protobuf.Value json_value = 2;

  // raw_text carries the original upstream response text when is_json is false.
  string raw_text = 3;
}

// LoginRequest describes the Hillstone login call.
message LoginRequest {
  // host is the Hillstone management base URL and must include scheme, host and port.
  string host = 1;

  // Deprecated: configure username on the instance config or secret instead.
  string username = 2 [deprecated = true];

  // Deprecated: configure password on the instance secret instead.
  string password = 3 [deprecated = true];
}

// AddressBookIP describes a single IP item in a Hillstone address-group payload.
message AddressBookIP {
  // ip_addr is the IPv4 address text required by the upstream API.
  string ip_addr = 1;

  // netmask is the prefix width text; when omitted the service uses "32".
  string netmask = 2;
}

// AddAddressGroupRequest adds one address group with its full IP set.
message AddAddressGroupRequest {
  // host is the Hillstone management base URL and must include scheme, host and port.
  string host = 1;

  // group_name is the target address-group name sent as the upstream name field.
  string group_name = 2;

  // ips is the full IP list to add into the address group.
  repeated AddressBookIP ips = 3;
}

// OverwriteAddressGroupRequest overwrites one address group with a new full IP set.
message OverwriteAddressGroupRequest {
  // host is the Hillstone management base URL and must include scheme, host and port.
  string host = 1;

  // group_name is the target address-group name sent as the upstream name field.
  string group_name = 2;

  // ips is the complete IP list that should remain in the address group after overwrite.
  repeated AddressBookIP ips = 3;
}

// QueryAddressGroupRequest queries one address group by name with optional paging parameters.
message QueryAddressGroupRequest {
  // host is the Hillstone management base URL and must include scheme, host and port.
  string host = 1;

  // group_name is encoded into query.conditions[0].value.
  string group_name = 2;

  // start is the query start offset; when omitted or non-positive the service uses 0.
  int32 start = 3;

  // limit is the query page size; when omitted or non-positive the service uses 50.
  int32 limit = 4;

  // page is the query page number; when omitted or non-positive the service uses 1.
  int32 page = 5;
}
