syntax = "proto3";

package WD_K01;

option go_package = "miner/grpc-service/WD_K01";

service WD_K01 {
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse) {}
  rpc UnblockIP(UnblockIPRequest) returns (UnblockIPResponse) {}
}

message BlockIPRequest {
  string ip = 1;
  int32 type = 2;
  int32 timeout = 3;
  int32 time_type = 4;
  string comment = 5;
  int32 color = 6;
}

message BlockIPResponse {
  bool success = 1;
  string msg_type = 2;
  string msg = 3;
  string raw_json = 4;
  string login_raw_json = 5;
  string logout_raw_text = 6;
}

message UnblockIPRequest {
  string ip = 1;
  int32 type = 2;
  int32 color = 3;
}

message UnblockIPResponse {
  bool success = 1;
  string msg_type = 2;
  string msg = 3;
  string raw_json = 4;
  string login_raw_json = 5;
  string logout_raw_text = 6;
  string computed_id = 7;
  string computed_ip = 8;
}
