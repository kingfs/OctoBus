syntax = "proto3";

package RiverSafeplusd_WAF;

service RiverSafeplusd_WAF {
  rpc SyncIPBlacklist(SyncIPBlacklistRequest) returns (SyncIPBlacklistResponse);
}

message SyncIPBlacklistRequest {
  repeated string items = 1;
}

message SyncIPBlacklistResponse {
  int32 http_status = 1;
  int32 err_no = 2;
  string err_msg = 3;
}
