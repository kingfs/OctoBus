syntax = "proto3";

package QIANXIN_FW_SecGate3600_HTTP_X;

import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

option go_package = "miner/grpc-service/QIANXIN_FW_SecGate3600_HTTP_X";

service QIANXIN_FW_SecGate3600_HTTP_X {
  rpc Login(LoginRequest) returns (DeviceHttpResponse) {}
  rpc BlockIP(BlacklistMutationRequest) returns (DeviceHttpResponse) {}
  rpc UnblockIP(BlacklistUndoRequest) returns (DeviceHttpResponse) {}
}

message LoginRequest {
  string host = 1;
  string user = 2 [deprecated = true];
  string password = 3 [deprecated = true];
  google.protobuf.StringValue txt_language = 4;
  google.protobuf.StringValue login_type = 5;
  google.protobuf.StringValue client = 6;
  google.protobuf.UInt32Value timeout_ms = 10;
}

message BlacklistMutationRequest {
  string host = 1;
  string uuid = 2 [deprecated = true];
  string ip = 3;
  google.protobuf.StringValue mask = 4;
  google.protobuf.StringValue description = 5;
  google.protobuf.UInt32Value timeout_ms = 10;
}

message BlacklistUndoRequest {
  string host = 1;
  string uuid = 2 [deprecated = true];
  string ip = 3;
  google.protobuf.StringValue mask = 4;
  google.protobuf.StringValue description = 5;
  google.protobuf.UInt32Value timeout_ms = 10;
}

message DeviceHttpResponse {
  int32 status_code = 1;
  repeated HttpHeader headers = 2 [deprecated = true];
  string raw_body = 3 [deprecated = true];
  google.protobuf.Struct body_json = 4;
  string effective_url = 5 [deprecated = true];
}

message HttpHeader {
  string key = 1;
  repeated string values = 2;
}
