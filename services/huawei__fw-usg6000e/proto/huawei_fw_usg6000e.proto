syntax = "proto3";

package HUAWEI_FW_USG6000E;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/HUAWEI_FW_USG6000E";

service HUAWEI_FW_USG6000E {
  rpc UpdateAddressGroup(UpdateAddressGroupRequest) returns (UpdateAddressGroupResponse) {}
}

message UpdateAddressGroupRequest {
  string host = 1 [deprecated = true];
  string device_name = 2;
  string book_name = 3;
  string user = 4 [deprecated = true];
  string password = 5 [deprecated = true];
  repeated string ipv4_list = 6;
  repeated string ipv6_list = 7;
  string desc = 8;
}

message UpdateAddressGroupResponse {
  bool success = 1;
  int32 http_status = 2;
  string raw_body = 3 [deprecated = true];
  string message = 4;
  bool preview_only = 5;
  string request_method = 6;
  string request_url = 7;
  google.protobuf.Struct request_headers = 8 [deprecated = true];
  string request_body = 9 [deprecated = true];
}
