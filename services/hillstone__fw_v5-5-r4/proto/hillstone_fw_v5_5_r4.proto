syntax = "proto3";

package HILLSTONE_FW_V55R4;

option go_package = "miner/grpc-service/HILLSTONE_FW_V55R4";

service HILLSTONE_FW_V55R4 {
  // Login 调用 Hillstone 登录接口 POST /rest/doc/login，返回原始 HTTP 状态码与响应文本。
  rpc Login(LoginRequest) returns (HttpResponse) {}

  // CreateAddressGroup 调用 Hillstone 地址组创建接口 POST /rest/doc/addrbook，按调用方给定的全量地址组数组原样写入。
  rpc CreateAddressGroup(CreateAddressGroupRequest) returns (HttpResponse) {}

  // UpdateAddressGroup 调用 Hillstone 地址组更新接口 PUT /rest/doc/addrbook，按调用方给定的全量地址组数组覆盖写入。
  rpc UpdateAddressGroup(UpdateAddressGroupRequest) returns (HttpResponse) {}

  // QueryAddressGroup 调用 Hillstone 地址组查询接口 GET /rest/doc/addrbook?query=...，返回原始 HTTP 状态码与响应文本。
  rpc QueryAddressGroup(QueryAddressGroupRequest) returns (HttpResponse) {}
}

message HttpResponse {
  int32 http_status = 1; // 下游 Hillstone HTTP 实际状态码；仅在 gRPC OK 场景中返回。
  string http_body = 2 [deprecated = true]; // Deprecated: 登录响应和错误详情不再返回原始响应文本。
}

message LoginRequest {
  string host = 1; // Hillstone 管理地址，必须包含协议、主机和端口，例如 https://203.0.113.10:8443。
  string user_name = 2 [deprecated = true]; // Deprecated: 使用 instance config/secret 中的用户名。
  string password = 3 [deprecated = true]; // Deprecated: 使用 instance secret 中的 password。
  string if_vsys_id = 4; // 登录请求体中的 ifVsysId 字段；为空时服务端默认使用 "0"。
  string vr_id = 5; // 登录请求体中的 vrId 字段；为空时服务端默认使用 "1"。
  string lang = 6; // 登录请求体中的 lang 字段；为空时服务端默认使用 "zh_CN"。
}

message CookieContext {
  string fromrootvsys = 1 [deprecated = true]; // Deprecated: session cookie is cached internally after Login.
  string role = 2 [deprecated = true]; // Deprecated: session cookie is cached internally after Login.
  string vsys_id = 3 [deprecated = true]; // Deprecated: session cookie is cached internally after Login.
  string token = 4 [deprecated = true]; // Deprecated: session cookie is cached internally after Login.
  string username = 5 [deprecated = true]; // Deprecated: session cookie is cached internally after Login.
  string lang = 6 [deprecated = true]; // Deprecated: session cookie is cached internally after Login.
}

message AddressBookIP {
  string ip_addr = 1; // 地址组 IP 项中的 ip_addr 字段。
  string netmask = 2; // 地址组 IP 项中的 netmask 字段。
  int32 flag = 3; // 地址组 IP 项中的 flag 字段。
}

message AddressBookRange {
  string min = 1; // 地址组 range 项中的最小 IP。
  string max = 2; // 地址组 range 项中的最大 IP。
  int32 flag = 3; // 地址组 range 项中的 flag 字段。
}

message AddressBookEntry {
  string name = 1; // 地址组 entry 项中的对象名称。
  string type = 2; // 地址组 entry 项中的类型字段，按调用方给定文本原样透传。
}

message AddressBookHost {
  string dns_name = 1; // 地址组 host 项中的 dns_name 字段。
}

message AddressBook {
  string name = 1; // 地址组名称，对应 HTTP JSON 数组元素中的 name 字段。
  repeated AddressBookIP ip = 2; // 地址组中的 IP 列表；创建和更新时应传入完整集合而非增量。
  repeated AddressBookRange range = 3; // 地址组中的 IP 范围列表；如无需要可为空。
  repeated AddressBookEntry entry = 4; // 地址组中的对象引用列表；如无需要可为空。
  repeated AddressBookHost host = 5; // 地址组中的域名主机列表；如无需要可为空。
}

message CreateAddressGroupRequest {
  string host = 1; // Hillstone 管理地址，必须包含协议、主机和端口。
  CookieContext cookie = 2 [deprecated = true]; // Deprecated: use cached session from Login.
  repeated AddressBook address_books = 3; // 需要创建的地址组数组，按 HTTP 接口要求序列化为 JSON 文本数组。
}

message UpdateAddressGroupRequest {
  string host = 1; // Hillstone 管理地址，必须包含协议、主机和端口。
  CookieContext cookie = 2 [deprecated = true]; // Deprecated: use cached session from Login.
  repeated AddressBook address_books = 3; // 需要更新的地址组数组，按 HTTP 接口要求序列化为 JSON 文本数组。
}

message QueryAddressGroupRequest {
  string host = 1; // Hillstone 管理地址，必须包含协议、主机和端口。
  CookieContext cookie = 2 [deprecated = true]; // Deprecated: use cached session from Login.
  string name = 3; // 查询条件中的地址组名称，对应 query.conditions[0].value。
  int32 start = 4; // 查询条件中的 start 分页起始值；默认 0。
  int32 limit = 5; // 查询条件中的 limit 分页大小；小于等于 0 时默认 50。
  int32 page = 6; // 查询条件中的 page 页码；小于等于 0 时默认 1。
}
