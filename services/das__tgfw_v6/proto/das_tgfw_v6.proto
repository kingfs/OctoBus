syntax = "proto3";

package DAS_TGFW_V6;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/DAS_TGFW_V6";

service DAS_TGFW_V6 {
  // 查询黑名单记录。
  rpc query_blacklist(query_blacklist_request) returns (query_blacklist_response) {}

  // 新增黑名单记录（封禁单个 IP）。
  rpc add_blacklist(add_blacklist_request) returns (add_blacklist_response) {}

  // 删除黑名单记录（解封）。
  rpc delete_blacklist(delete_blacklist_request) returns (delete_blacklist_response) {}
}

message blacklist_val {
  int64 id = 1;
  string s_addr = 2;
  bool enable = 3;
  int64 lifespan = 4;
  google.protobuf.Value raw = 5;
}

message query_blacklist_request {
  int64 page = 1;
  int64 size = 2;
  bool is_ip6 = 3;
  string s_addr = 4;
}

message query_blacklist_response {
  int32 http_status = 1;
  string raw_body = 2;
  google.protobuf.Value raw_json = 3;
  repeated blacklist_val vals = 4;
  string msg = 5;
}

message add_blacklist_request {
  bool is_ip6 = 1;
  string s_addr = 2;
  int64 lifespan = 3;
  bool enable = 4;
}

message add_blacklist_response {
  int32 http_status = 1;
  string raw_body = 2;
  google.protobuf.Value raw_json = 3;
  string msg = 4;
}

message delete_blacklist_request {
  int64 id = 1;
  bool is_ip6 = 2;
}

message delete_blacklist_response {
  int32 http_status = 1;
  string raw_body = 2;
  google.protobuf.Value raw_json = 3;
  string msg = 4;
}
