syntax = "proto3";

package Wangsu_LabelIP;

import "google/protobuf/wrappers.proto";

option go_package = "miner/grpc-service/Wangsu_LabelIP";

service WangsuLabelIPService {
  rpc BatchForbidIP(BatchForbidIPRequest) returns (BatchIPOperationResponse);
  rpc BatchUnforbidIP(BatchUnforbidIPRequest) returns (BatchIPOperationResponse);
}

message BatchForbidIPRequest {
  repeated string ip_list = 1;
  string label_code = 2;
  google.protobuf.Int64Value forbid_time_minutes = 3;
  string request_id = 4;
}

message BatchUnforbidIPRequest {
  repeated string ip_list = 1;
  string label_code = 2;
  google.protobuf.Int64Value forbid_time_minutes = 3;
  string request_id = 4;
}

enum OperationOutcome {
  OPERATION_OUTCOME_UNSPECIFIED = 0;
  OPERATION_OUTCOME_SUCCESS = 1;
  OPERATION_OUTCOME_PARTIAL = 2;
  OPERATION_OUTCOME_FAILED = 3;
}

message OperationAudit {
  string engine_instance_id = 1;
  string request_id = 2;
  string operation_type = 3;
  int32 ip_count = 4;
}

message BatchIPOperationResponse {
  OperationOutcome outcome = 1;
  string upstream_code = 2;
  string upstream_message = 3;
  int32 requested_ip_count = 4;
  repeated string failed_ips = 5;
  string label_code = 6;
  google.protobuf.Int64Value forbid_time_minutes = 7;
  OperationAudit audit = 8;
}
