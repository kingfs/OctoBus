syntax = "proto3";

package Nsfocus_NIPS_V56R11;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/Nsfocus_NIPS_V56R11";

service Nsfocus_NIPS_V56R11 {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc BlockIP(BlockIPRequest) returns (NipsResponse) {}
  rpc ListBlacklist(ListBlacklistRequest) returns (ListBlacklistResponse) {}
  rpc UnblockByIds(UnblockByIdsRequest) returns (NipsResponse) {}
  rpc ApplyConfig(ApplyConfigRequest) returns (NipsResponse) {}
}

message LoginRequest {
  string username = 1;
  string password = 2;
  string lang = 3;
}

message LoginResponse {
  int64 code = 1;
  string message = 2;
  google.protobuf.Value data = 3;
  string api_key = 4;
  string security_key = 5;
  int32 http_status = 6;
  string raw_body = 7;
  google.protobuf.Value raw_json = 8;
}

message BlockIPRequest {
  string ip = 1;
  string direction = 2;
  string threat_type = 3;
  string start_time = 4;
  string end_time = 5;
  string abstract = 6;
}

message ListBlacklistRequest {
  int64 page_size = 1;
  int64 page_no = 2;
}

message BlacklistEntry {
  int64 id = 1;
  string name = 2;
  string start_time = 3;
  string end_time = 4;
  string abstract = 5;
  string enabled = 6;
  string threat_type = 7;
  google.protobuf.Value raw = 8;
}

message ListBlacklistResponse {
  int64 code = 1;
  string message = 2;
  google.protobuf.Value data = 3;
  repeated BlacklistEntry entries = 4;
  int32 http_status = 5;
  string raw_body = 6;
  google.protobuf.Value raw_json = 7;
}

message UnblockByIdsRequest {
  repeated int64 ids = 1;
}

message ApplyConfigRequest {
}

message NipsResponse {
  int64 code = 1;
  string message = 2;
  google.protobuf.Value data = 3;
  int32 http_status = 4;
  string raw_body = 5;
  google.protobuf.Value raw_json = 6;
}
