syntax = "proto3";

package ThreatBook_TIP_V4;

option go_package = "miner/grpc-service/ThreatBook_TIP_V4";

service ThreatBook_TIP_V4 {
  rpc QueryIPReputation(QueryIPReputationRequest) returns (QueryIPReputationResponse) {}
}

message QueryIPReputationRequest {
  string ip = 1;
}

message QueryIPReputationResponse {
  int32 http_status = 1;
  string http_body = 2;
}
