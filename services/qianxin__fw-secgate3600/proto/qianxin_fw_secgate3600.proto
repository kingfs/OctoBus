syntax = "proto3";

package QIANXIN_FW_SecGate3600;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/QIANXIN_FW_SecGate3600";

service QIANXIN_FW_SecGate3600 {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc UpdateAddressGroup(UpdateAddressGroupRequest) returns (UpdateAddressGroupResponse) {}
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
}

message HttpHeader {
  string key = 1;
  repeated string values = 2;
}

message LoginRequest {
  string host = 1;
  string username = 2 [deprecated = true];
  string password = 3 [deprecated = true];
}

message LoginResult {
  string error_code = 1;
  string token = 2 [deprecated = true];
  google.protobuf.Value raw = 3 [deprecated = true];
}

message LoginResponse {
  bool success = 1;
  LoginResult result = 2;
  int32 http_status = 3;
  string raw_body = 4 [deprecated = true];
  google.protobuf.Value raw_json = 5 [deprecated = true];
  repeated HttpHeader headers = 6 [deprecated = true];
}

message AddressItem {
  string ip = 1;
  string addr_type = 2;
}

message AddressGroupObject {
  string name = 1;
  string oldname = 2;
  string desc = 3;
  repeated AddressItem include = 4;
  repeated AddressItem exclude = 5;
}

message UpdateAddressGroupHead {
  string module = 1;
  string function = 2;
}

message UpdateAddressGroupBody {
  repeated AddressGroupObject obj_addr = 1;
}

message UpdateAddressGroupEntry {
  UpdateAddressGroupHead head = 1;
  UpdateAddressGroupBody body = 2;
}

message UpdateAddressGroupRequest {
  string host = 1;
  repeated UpdateAddressGroupEntry entries = 2;
}

message UpdateAddressGroupResponseHead {
  int64 error_code = 1;
  string message = 2;
  google.protobuf.Value raw = 3;
}

message UpdateAddressGroupResponse {
  UpdateAddressGroupResponseHead head = 1;
  google.protobuf.Value body = 2;
  int32 http_status = 3;
  string raw_body = 4 [deprecated = true];
  google.protobuf.Value raw_json = 5 [deprecated = true];
  repeated HttpHeader headers = 6 [deprecated = true];
}

message LogoutRequest {
  string host = 1;
  string username = 2 [deprecated = true];
}

message LogoutResponse {
  google.protobuf.Value raw_json = 1 [deprecated = true];
  int32 http_status = 2;
  string raw_body = 3 [deprecated = true];
  repeated HttpHeader headers = 4 [deprecated = true];
}
