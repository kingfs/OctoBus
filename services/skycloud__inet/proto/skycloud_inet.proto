syntax = "proto3";

package SKYCloud_INET;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/SKYCloud_INET";

service SKYCloud_INET {
  rpc BatchBlockIP(BatchOperateIPRequest) returns (BatchOperateIPResponse) {}
  rpc BatchUnblockIP(BatchOperateIPRequest) returns (BatchOperateIPResponse) {}
}

message BatchOperateIPRequest {
  string environment_name = 1;
  repeated IPDirective ip_directives = 2;
  OperationContext context = 3;
  TicketTemplate ticket_template = 4;
  ConnectionProfile connection = 5;
}

message IPDirective {
  string ip = 1;
  string description = 2;
}

message OperationContext {
  string workflow_name = 1;
  string operator = 2;
  map<string, string> labels = 3;
  google.protobuf.Struct extra_metadata = 4;
}

message TicketTemplate {
  string name = 1;
  string description = 2;
  string direction = 3;
  string ip_description_prefix = 4;
  map<string, string> attributes = 5;
  google.protobuf.Struct extra = 6;
}

message ConnectionProfile {
  string host = 1;
  string username = 2;
  string password = 3 [deprecated = true];
}

message BatchOperateIPResponse {
  repeated IPResult results = 1;
  repeated WorkOrderSummary work_orders = 2;
}

message IPResult {
  string ip = 1;
  bool success = 2;
  string error_message = 3;
  repeated string work_order_ids = 4;
  string batch_token = 5;
}

message WorkOrderSummary {
  string work_order_id = 1;
  string type = 2;
  string environment_id = 3;
  uint32 ip_count = 4;
  string name = 5;
  uint32 batch_index = 6;
  map<string, string> attributes = 7;
}
