syntax = "proto3";

package Panabit_TANG_R1;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/Panabit_TANG_R1";

service Panabit_TANG_R1 {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc ListIPTable(ListIPTableRequest) returns (ListIPTableResponse) {}
  rpc AddIPTable(AddIPTableRequest) returns (AddIPTableResponse) {}
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse) {}
  rpc UnblockIP(UnblockIPRequest) returns (UnblockIPResponse) {}
}

message LoginRequest {
}

message LoginResponse {
  int32 code = 1;
  string api_token = 2 [deprecated = true];
  google.protobuf.Struct raw = 3 [deprecated = true];
}

message ListIPTableRequest {
  string api_token = 1 [deprecated = true];
  string keyword = 2;
}

message ListIPTableResponse {
  int32 code = 1;
  string msg = 2;
  repeated IPTableItem data = 3;
  google.protobuf.Struct raw = 4;
}

message IPTableItem {
  string id = 1;
  string name = 2;
  repeated string member = 3;
}

message AddIPTableRequest {
  string api_token = 1 [deprecated = true];
  string name = 2;
}

message AddIPTableResponse {
  int32 code = 1;
  string msg = 2;
  google.protobuf.Struct raw = 3;
}

message BlockIPRequest {
  string api_token = 1 [deprecated = true];
  string name = 2;
  string id = 3;
  string ip = 4;
}

message BlockIPResponse {
  int32 code = 1;
  string msg = 2;
  google.protobuf.Struct raw = 3;
}

message UnblockIPRequest {
  string api_token = 1 [deprecated = true];
  string name = 2;
  string id = 3;
  string ip = 4;
}

message UnblockIPResponse {
  int32 code = 1;
  string msg = 2;
  google.protobuf.Struct raw = 3;
}
