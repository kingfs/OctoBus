syntax = "proto3";

package TopSec_FW_V376;

import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

option go_package = "miner/grpc-service/TopSec_FW_V376";

service TopSec_FW_V376 {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc AddBlacklistIP(AddBlacklistIPRequest) returns (BlacklistMutationResponse) {}
  rpc DeleteBlacklistIP(DeleteBlacklistIPRequest) returns (BlacklistMutationResponse) {}
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
}

message SessionContext {
  string token = 1 [deprecated = true];
  string secret = 2 [deprecated = true];
  string user_mark = 3 [deprecated = true];
  string cookie = 4 [deprecated = true];
  google.protobuf.Struct vendor_state = 10 [deprecated = true];
}

message LoginRequest {
  google.protobuf.StringValue username = 1 [deprecated = true];
  google.protobuf.StringValue password = 2 [deprecated = true];
  google.protobuf.StringValue aes_key = 3 [deprecated = true];
  google.protobuf.StringValue aes_iv = 4 [deprecated = true];
  google.protobuf.BoolValue allow_http = 5;
  google.protobuf.StringValue host = 6;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
}

message AddBlacklistIPRequest {
  SessionContext session = 1 [deprecated = true];
  repeated string ip_addresses = 2;
  google.protobuf.StringValue memo = 3;
}

message DeleteBlacklistIPRequest {
  SessionContext session = 1 [deprecated = true];
  repeated string ip_addresses = 2;
}

message BlacklistFailure {
  string ip = 1;
  string reason = 2;
  string code = 3;
}

message BlacklistMutationResponse {
  repeated string succeeded_ips = 1;
  repeated BlacklistFailure failures = 2;
  string message = 3;
}

message LogoutRequest {
  SessionContext session = 1 [deprecated = true];
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
}
