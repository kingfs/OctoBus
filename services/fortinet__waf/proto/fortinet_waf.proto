syntax = "proto3";

package Fortinet_WAF;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/Fortinet_WAF";

service Fortinet_WAF {
  // 检查 Fortinet WAF 在线状态；成功时表示 HTTPS 认证可用且设备返回 status=1。
  rpc CheckOnline(CheckOnlineRequest) returns (CheckOnlineResponse) {}

  // 向指定地址组新增一个被封禁 IP 条目，对应 Fortinet 创建 IPList 成员接口。
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse) {}

  // 查询指定地址组当前的成员列表，返回 member_id、IP 与其他业务字段。
  rpc ListIPListMembers(ListIPListMembersRequest) returns (ListIPListMembersResponse) {}

  // 按 Fortinet 成员编号删除指定地址组中的一条 IP 记录，实现解封。
  rpc UnblockIP(UnblockIPRequest) returns (UnblockIPResponse) {}
}

message CheckOnlineRequest {}

message CheckOnlineResponse {
  bool success = 1; // 归一化后的成功标志；仅当 HTTP 成功且 JSON 中 status=1 时为 true。
  int32 http_status = 2; // Fortinet 原始 HTTP 状态码。
  int32 status = 3; // Fortinet 原始 status 字段。
  string msg = 4; // Fortinet 原始 msg 字段。
  string version = 5; // Fortinet 原始 version 字段。
  string raw_body = 6; // Fortinet 原始响应文本。
  google.protobuf.Value raw_json = 7; // Fortinet 原始 JSON 响应；可为对象、数组或 null。
}

message BlockIPRequest {
  string book_name = 1; // Fortinet WAF 中的目标地址组名称，对应 URI 中的 {book_name}。
  string ip = 2; // 待封禁的 IPv4 或 IPv6 地址，对应 Fortinet 请求体字段 iPv4IPv6。
}

message BlockIPResponse {
  bool success = 1; // 归一化后的成功标志；仅当 HTTP 200 且响应可解释为成功结果时为 true。
  int32 http_status = 2; // Fortinet 原始 HTTP 状态码。
  int32 status = 3; // Fortinet 原始 status 字段。
  int32 affected = 4; // Fortinet 原始 affected 字段；缺失时为 0。
  string msg = 5; // Fortinet 原始 msg 字段。
  string raw_body = 6; // Fortinet 原始响应文本。
  google.protobuf.Value raw_json = 7; // Fortinet 原始 JSON 响应；可为对象、数组或 null。
}

message ListIPListMembersRequest {
  string book_name = 1; // 需要查询的地址组名称，对应 URI 中的 {book_name}。
}

message IPListMember {
  int64 member_id = 1; // Fortinet 返回的成员编号，对应列表元素中的 id。
  int32 type = 2; // Fortinet 原始 type 字段。
  string ip = 3; // Fortinet 原始 iPv4IPv6 字段。
  int32 severity = 4; // Fortinet 原始 severity 字段。
  string trigger_policy = 5; // Fortinet 原始 triggerPolicy 字段。
  int32 status = 6; // Fortinet 原始 status 字段。
}

message ListIPListMembersResponse {
  repeated IPListMember members = 1; // 地址组当前所有成员的结构化列表。
  int32 http_status = 2; // Fortinet 原始 HTTP 状态码。
  string raw_body = 3; // Fortinet 原始响应文本。
  google.protobuf.Value raw_json = 4; // Fortinet 原始 JSON 响应；此接口通常为数组。
}

message UnblockIPRequest {
  string book_name = 1; // 目标地址组名称，对应 URI 中的 {book_name}。
  int64 member_id = 2; // 需要删除的 Fortinet 成员编号，对应 URI 中的 {member_id}。
}

message UnblockIPResponse {
  bool success = 1; // 归一化后的成功标志；仅当 HTTP 200 且 affected=1 时为 true。
  int32 http_status = 2; // Fortinet 原始 HTTP 状态码。
  int32 status = 3; // Fortinet 原始 status 字段。
  int32 affected = 4; // Fortinet 原始 affected 字段。
  string msg = 5; // Fortinet 原始 msg 字段。
  string raw_body = 6; // Fortinet 原始响应文本。
  google.protobuf.Value raw_json = 7; // Fortinet 原始 JSON 响应；可为对象、数组或 null。
}
