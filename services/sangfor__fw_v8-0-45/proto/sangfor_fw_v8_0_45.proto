syntax = "proto3";

package Sangfor_FW_V8045;

import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

option go_package = "miner/grpc-service/Sangfor_FW_V8045";

service Sangfor_FW_V8045 {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse) {}
  rpc UnblockIP(UnblockIPRequest) returns (UnblockIPResponse) {}
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
}

message LoginRequest {
  google.protobuf.StringValue name = 1;
  google.protobuf.StringValue password = 2 [deprecated = true];
}

message LoginResponse {
  int32 code = 1;
  string message = 2;
  string token = 3 [deprecated = true];
  google.protobuf.Value data = 4 [deprecated = true];
}

message BlockIPRequest {
  string token = 1 [deprecated = true];
  repeated string addresses = 2;
  google.protobuf.StringValue description = 3;
}

message BlockIPResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value data = 3;
}

message UnblockIPRequest {
  string token = 1 [deprecated = true];
  repeated string addresses = 2;
}

message UnblockIPResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value data = 3;
}

message LogoutRequest {
  string token = 1 [deprecated = true];
}

message LogoutResponse {
  int32 code = 1;
  string message = 2;
  google.protobuf.Value data = 3;
}
