syntax = "proto3";

package ThreatBook_OneSIG;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/ThreatBook_OneSIG";

service ThreatBook_OneSIG {
  rpc BatchBlockIP(BatchBlockIPRequest) returns (BatchBlockIPResponse) {}
  rpc ListInboundBlacklistEntries(ListInboundBlacklistEntriesRequest) returns (ListInboundBlacklistEntriesResponse) {}
  rpc BatchUnblockByEntryIds(BatchUnblockByEntryIdsRequest) returns (BatchUnblockByEntryIdsResponse) {}
}

message OperationStatus {
  int32 response_code = 1;
  string verbose_msg = 2;
}

message BlacklistEntry {
  string id = 1;
  string object = 2;
  string object_type = 3;
  int64 life_cycle_seconds = 4;
  string state = 5;
  string comments = 6;
  string threat_name = 7;
}

message BatchBlockIPRequest {
  repeated string ip_addresses = 1;
  int64 life_cycle_seconds = 2;
  string comments = 3;
  string threat_name = 4;
  string object_type = 5;
}

message BatchBlockIPResponse {
  OperationStatus status = 1;
  repeated BlacklistEntry entries = 2;
  google.protobuf.Struct raw = 3;
}

message ListInboundBlacklistEntriesRequest {
  int64 page_no = 1;
  int64 page_size = 2;
  string search = 3;
  string object_type = 4;
  string input_type = 5;
  string state = 6;
}

message ListInboundBlacklistEntriesResponse {
  OperationStatus status = 1;
  repeated BlacklistEntry entries = 2;
  int64 page_no = 3;
  int64 page_size = 4;
  int64 total = 5;
  google.protobuf.Struct raw = 6;
}

message BatchUnblockByEntryIdsRequest {
  repeated string entry_ids = 1;
  string object_type = 2;
}

message BatchUnblockByEntryIdsResponse {
  OperationStatus status = 1;
  google.protobuf.Struct raw = 2;
}
