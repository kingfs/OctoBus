syntax = "proto3";

package TopSec_FW_5U;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/TopSec_FW_5U";

service TopSec_FW_5U {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {}
  rpc AddToBlacklist(AddToBlacklistRequest) returns (BlacklistOperationResponse) {}
  rpc RemoveFromBlacklist(RemoveFromBlacklistRequest) returns (BlacklistOperationResponse) {}
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
}

message SessionContext {
  string host = 1 [deprecated = true];
  string token = 2 [deprecated = true];
  string user_mark = 3 [deprecated = true];
  string cookie = 4 [deprecated = true];
  bool skip_tls_verify = 5 [deprecated = true];
  bool allow_http = 6 [deprecated = true];
  google.protobuf.Struct vendor_state = 10 [deprecated = true];
}

message LoginRequest {
  string host = 1;
  string username = 2 [deprecated = true];
  string password = 3 [deprecated = true];
  bool skip_tls_verify = 4;
  bool allow_http = 5;
}

message RefreshRequest {
  SessionContext session = 1 [deprecated = true];
}

message AddToBlacklistRequest {
  SessionContext session = 1 [deprecated = true];
  string ip = 2;
}

message RemoveFromBlacklistRequest {
  SessionContext session = 1 [deprecated = true];
  string ip = 2;
}

message LogoutRequest {
  SessionContext session = 1 [deprecated = true];
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  int32 http_status = 3;
}

message RefreshResponse {
  bool success = 1;
  string message = 2;
  int32 http_status = 3;
}

message BlacklistOperationResponse {
  string ip = 1;
  bool success = 2;
  bool idempotent_success = 3;
  string message = 4;
  int32 http_status = 5;
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
  int32 http_status = 3;
}
