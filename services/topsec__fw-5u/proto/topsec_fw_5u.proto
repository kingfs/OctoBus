syntax = "proto3";

package TopSec_FW_5U;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/TopSec_FW_5U";

service TopSec_FW_5U {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc Refresh(RefreshRequest) returns (RefreshResponse) {}
  rpc AddToBlacklist(AddToBlacklistRequest) returns (BlacklistOperationResponse) {}
  rpc RemoveFromBlacklist(RemoveFromBlacklistRequest) returns (BlacklistOperationResponse) {}
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
}

message SessionContext {
  string host = 1;
  string token = 2;
  string user_mark = 3;
  string cookie = 4;
  bool skip_tls_verify = 5;
  bool allow_http = 6;
  google.protobuf.Struct vendor_state = 10;
}

message LoginRequest {
  string host = 1;
  string username = 2;
  string password = 3;
  bool skip_tls_verify = 4;
  bool allow_http = 5;
}

message RefreshRequest {
  SessionContext session = 1;
}

message AddToBlacklistRequest {
  SessionContext session = 1;
  string ip = 2;
}

message RemoveFromBlacklistRequest {
  SessionContext session = 1;
  string ip = 2;
}

message LogoutRequest {
  SessionContext session = 1;
}

message LoginResponse {
  bool success = 1;
  string message = 2;
  SessionContext session = 3;
  int32 http_status = 4;
  string raw_body = 5;
  google.protobuf.Struct raw_json = 6;
}

message RefreshResponse {
  bool success = 1;
  string message = 2;
  SessionContext session = 3;
  int32 http_status = 4;
  string raw_body = 5;
  google.protobuf.Struct raw_json = 6;
}

message BlacklistOperationResponse {
  string ip = 1;
  bool success = 2;
  bool idempotent_success = 3;
  string message = 4;
  SessionContext session = 5;
  int32 http_status = 6;
  string raw_body = 7;
  google.protobuf.Struct raw_json = 8;
}

message LogoutResponse {
  bool success = 1;
  string message = 2;
  int32 http_status = 3;
  string raw_body = 4;
  google.protobuf.Struct raw_json = 5;
}
