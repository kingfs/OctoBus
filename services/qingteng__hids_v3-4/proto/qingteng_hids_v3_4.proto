syntax = "proto3";

package QingTeng_HIDS_V34;

option go_package = "miner/grpc-service/QingTeng_HIDS_V34";

service QingTeng_HIDS_V34 {
  rpc Login(LoginRequest) returns (QingTengResponse) {}
  rpc QueryHostAssets(QueryHostAssetsRequest) returns (QingTengResponse) {}
  rpc CreateHostIsolation(CreateHostIsolationRequest) returns (QingTengResponse) {}
  rpc DeleteHostIsolation(DeleteHostIsolationRequest) returns (QingTengResponse) {}
}

message LoginRequest {}

message QueryHostAssetsRequest {
  string ip = 1;
  string system_type = 2;
}

message CreateHostIsolationRequest {
  repeated string agent_ids = 1;
  string remark = 2;
}

message DeleteHostIsolationRequest {
  repeated string agent_ids = 1;
}

message QingTengResponse {
  int32 http_status = 1;
  string raw_body = 2;
}
