syntax = "proto3";

package DPtech_FW_V4610;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/DPtech_FW_V4610";

service DPtech_FW_V4610 {
  // 查询包过滤即时生效开关状态，对应 GET /func/web_main/api/system/sysinfolist/pfInEfList。
  rpc GetPacketFilterStatus(GetPacketFilterStatusRequest) returns (GetPacketFilterStatusResponse) {}

  // 启用包过滤即时生效开关，对应 PUT /func/web_main/api/system/sysinfolist/pfInEfList。
  rpc EnablePacketFilterImmediate(EnablePacketFilterImmediateRequest) returns (EnablePacketFilterImmediateResponse) {}

  // 按名称关键字模糊查询地址组，对应 GET /func/web_main/api/netaddr/netaddr_obj/netaddrobjlist。
  rpc ListAddressGroups(ListAddressGroupsRequest) returns (ListAddressGroupsResponse) {}

  // 创建地址组，对应 POST /func/web_main/api/netaddr/netaddr_obj/netaddrobjlist。
  rpc CreateAddressGroup(CreateAddressGroupRequest) returns (CreateAddressGroupResponse) {}

  // 更新地址组，对应 PUT /func/web_main/api/netaddr/netaddr_obj/netaddrobjlist。
  rpc UpdateAddressGroup(UpdateAddressGroupRequest) returns (UpdateAddressGroupResponse) {}

  // 删除地址组，对应 DELETE /func/web_main/api/netaddr/netaddr_obj/netaddrobjlist。
  rpc DeleteAddressGroup(DeleteAddressGroupRequest) returns (DeleteAddressGroupResponse) {}

  // 查询安全策略详情，对应 GET /func/web_main/api/pf_policy/pf_policy/pf_policy/securitypolicylist。
  rpc GetSecurityPolicy(GetSecurityPolicyRequest) returns (GetSecurityPolicyResponse) {}

  // 创建安全策略，对应 POST /func/web_main/api/pf_policy/pf_policy/pf_policy/securitypolicylist。
  rpc CreateSecurityPolicy(CreateSecurityPolicyRequest) returns (CreateSecurityPolicyResponse) {}

  // 更新安全策略，对应 PUT /func/web_main/api/pf_policy/pf_policy/pf_policy/securitypolicylist。
  rpc UpdateSecurityPolicy(UpdateSecurityPolicyRequest) returns (UpdateSecurityPolicyResponse) {}

  // 删除安全策略，对应 DELETE /func/web_main/api/pf_policy/pf_policy/pf_policy/securitypolicylist。
  rpc DeleteSecurityPolicy(DeleteSecurityPolicyRequest) returns (DeleteSecurityPolicyResponse) {}
}

message GetPacketFilterStatusRequest {}

message EnablePacketFilterImmediateRequest {}

message ListAddressGroupsRequest {
  string search_value = 1; // 地址组名称关键字，对应 HTTP query 参数 searchValue，必填。
}

message CreateAddressGroupRequest {
  string group_name = 1; // 地址组名称，对应 HTTP body 中 netaddrobjlist.name，必填。
  string description = 2; // 地址组描述，对应 HTTP body 中 netaddrobjlist.desc，可为空。
  repeated string ip_cidrs = 3; // 地址组内的 IPv4/CIDR 列表；裸 IPv4 会在服务端补全为 /32。
}

message UpdateAddressGroupRequest {
  string old_group_name = 1; // 旧地址组名称，对应 HTTP body 中 netaddrobjlist.oldName，必填。
  string new_group_name = 2; // 新地址组名称，对应 HTTP body 中 netaddrobjlist.name，必填。
  string description = 3; // 新描述，对应 HTTP body 中 netaddrobjlist.desc，可为空。
  repeated string ip_cidrs = 4; // 更新后的 IPv4/CIDR 列表；裸 IPv4 会在服务端补全为 /32。
}

message DeleteAddressGroupRequest {
  string group_name = 1; // 要删除的地址组名称，对应 HTTP body 中 netaddrobjlist.name，必填。
}

message GetSecurityPolicyRequest {
  string policy_name = 1; // 安全策略名称，对应 HTTP query 参数 name，必填。
}

message CreateSecurityPolicyRequest {
  string policy_name = 1; // 要创建的安全策略名称，对应 HTTP body 中 securitypolicylist.name，必填。
  bool enabled = 2; // 是否启用策略；true 对应设备值 "1"，false 对应设备值 "0"。
  string action = 3; // 策略动作，对应 HTTP body 中 securitypolicylist.action，必填。
  repeated string source_ip_names = 4; // 源地址组名称列表，对应 HTTP body 中 securitypolicylist.sourceIpGroups。
}

message UpdateSecurityPolicyRequest {
  string old_policy_name = 1; // 旧安全策略名称，对应 HTTP body 中 securitypolicylist.oldName，必填。
  string new_policy_name = 2; // 新安全策略名称，对应 HTTP body 中 securitypolicylist.name，必填。
  bool enabled = 3; // 是否启用策略；true 对应设备值 "1"，false 对应设备值 "0"。
  string action = 4; // 策略动作，对应 HTTP body 中 securitypolicylist.action，必填。
  repeated string source_ip_names = 5; // 源地址组/对象名称列表，对应 HTTP body 中 securitypolicylist.sourceIpObjects。
}

message DeleteSecurityPolicyRequest {
  string policy_name = 1; // 要删除的安全策略名称，对应 HTTP body 中 securitypolicylist.name，必填。
}

message AddressGroupRecord {
  string name = 1; // 地址组名称，对应 netaddrobjlist.name。
  string ip = 2; // 地址组内的逗号分隔 IP/CIDR 文本，对应 netaddrobjlist.ip。
  string description = 3; // 地址组描述，对应 netaddrobjlist.desc。
}

message SecurityPolicyRecord {
  string name = 1; // 策略名称，对应 securitypolicylist.name。
  string enabled = 2; // 设备返回的启用状态原始文本，对应 securitypolicylist.enabled。
  string action = 3; // 设备返回的动作原始文本，对应 securitypolicylist.action。
  string source_ip_objects = 4; // 设备返回的源地址组/对象文本，对应 sourceIpObjects/sourceIpGroups。
}

message GetPacketFilterStatusResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret；若响应无 ret 或无正文则为空字符串。
  string raw_body = 3; // 下游 HTTP 原始响应体文本；空响应时为空字符串。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON；无法解析或空响应时为空。
  string enable = 5; // 包过滤即时生效开关状态，对应 pfInEfList.enable。
  string ip_version = 6; // 包过滤状态中的 IP 版本，对应 pfInEfList.ipVersion。
}

message EnablePacketFilterImmediateResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret；若响应无 ret 或无正文则为空字符串。
  string raw_body = 3; // 下游 HTTP 原始响应体文本；空响应时为空字符串。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON；无法解析或空响应时为空。
}

message ListAddressGroupsResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret。
  string raw_body = 3; // 下游 HTTP 原始响应体文本。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON。
  repeated AddressGroupRecord items = 5; // 从 netaddrobjlist 结构化提取出的地址组记录列表。
}

message CreateAddressGroupResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret。
  string raw_body = 3; // 下游 HTTP 原始响应体文本。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON。
}

message UpdateAddressGroupResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret；空响应时为空字符串。
  string raw_body = 3; // 下游 HTTP 原始响应体文本；若返回 Duplicate IP address ranges. 则保留该文本。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON；空响应或非 JSON 文本时为空。
}

message DeleteAddressGroupResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret。
  string raw_body = 3; // 下游 HTTP 原始响应体文本。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON。
}

message GetSecurityPolicyResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret。
  string raw_body = 3; // 下游 HTTP 原始响应体文本。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON。
  repeated SecurityPolicyRecord items = 5; // 从 securitypolicylist 结构化提取出的策略记录列表。
}

message CreateSecurityPolicyResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret。
  string raw_body = 3; // 下游 HTTP 原始响应体文本。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON。
}

message UpdateSecurityPolicyResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret；空响应时为空字符串。
  string raw_body = 3; // 下游 HTTP 原始响应体文本；空响应时为空字符串。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON；空响应时为空。
}

message DeleteSecurityPolicyResponse {
  int32 http_status = 1; // 下游 HTTP 实际状态码。
  string ret = 2; // 设备业务返回码 ret。
  string raw_body = 3; // 下游 HTTP 原始响应体文本。
  google.protobuf.Value raw_json = 4; // 下游 HTTP 响应体的结构化 JSON。
}
