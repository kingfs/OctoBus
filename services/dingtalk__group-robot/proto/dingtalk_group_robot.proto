syntax = "proto3";

package DingDing_GroupRobot;

option go_package = "miner/grpc-service/DingDing_GroupRobot";

// DingDing_GroupRobot 提供钉钉群自定义机器人消息推送能力，通过统一 Engine gRPC service 封装钉钉 Webhook 接口。
service DingDing_GroupRobot {
  // SendTextMessage 向已配置的钉钉群机器人发送一条文本消息。
  // 仅支持 msgtype="text" 类型的消息，包含文本内容和 @ 相关控制。
  // 响应中返回下游 HTTP 状态码，响应体字段为兼容旧协议固定置空。
  rpc SendTextMessage(SendTextMessageRequest) returns (SendTextMessageResponse) {}
}

// SendTextMessageRequest 描述发送文本消息的请求参数。
message SendTextMessageRequest {
  // send_msg 为要发送的文本内容，必填，对应钉钉侧 text.content。
  string send_msg = 1;

  // is_groupsendall 表示是否 @ 全员，必填，对应钉钉侧 at.isAtAll。
  bool is_groupsendall = 2;

  // send_PeoplePhone 为需要单独 @ 的手机号码列表，可选，对应钉钉侧 at.atMobiles。
  // 可传入逗号分隔的字符串或字符串数组形式。
  repeated string send_PeoplePhone = 3;

  // send_DingDingID 为需要单独 @ 的钉钉用户 ID 列表，可选，对应钉钉侧 at.atUserIds。
  // 可传入逗号分隔的字符串或字符串数组形式。
  repeated string send_DingDingID = 4;
}

// SendTextMessageResponse 返回消息发送结果。
message SendTextMessageResponse {
  // http_status 为下游钉钉 Webhook 返回的 HTTP 状态码。
  // 当网络错误或请求未发出时，该值为 0。
  int32 http_status = 1;

  // http_body 兼容旧响应字段。当前实现为避免泄露上游内容固定返回空字符串。
  string http_body = 2;
}
