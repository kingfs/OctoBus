syntax = "proto3";

package safeline.eliminate;

option go_package = "miner/grpc-service/Safeline/Eliminate_False_Positive;safeline_eliminate_false_positive";

// Safeline 误报消除 JS gRPC service，运行于 JS 引擎 runtime，透传调用 Safeline 上游的 EliminateFalsePositive 接口。
service EliminateService {
  // EliminateFalsePositive 根据请求体携带的 target/method 调用 Safeline 上游 gRPC，执行 HTTP 误报消除。
  rpc EliminateFalsePositive(EliminateFalsePositiveRequest) returns (EliminateFalsePositiveResponse) {}
}

// EliminateFalsePositiveRequest 描述向 Safeline 发起误报消除所需的参数。
message EliminateFalsePositiveRequest {
  string event_id = 1; // 待消除的 Safeline 事件 ID，必填，非空字符串，直接映射上游 request.event_id。
  bool is_global = 2; // 是否执行全局误报消除，必填，布尔值，直接映射上游 request.is_global。

  string target = 10; // Safeline 上游 gRPC 目标地址（host:port），必填，不提供默认值，例如 10.9.33.133:50053。
  string method = 11; // Safeline 上游 fullMethod，必填，示例 safeline.eliminate.EliminateService/EliminateFalsePositive；缺失或为空即视为非法。
}

// EliminateFalsePositiveResponse 将 Safeline 响应中的业务字段结构化返回。
message EliminateFalsePositiveResponse {
  bool success = 1; // Safeline 响应 success 字段；若上游缺失则返回默认值 false。
  // Safeline 实际返回中 ruleId 与 ruleType 的字段编号分别为 3 和 4，
  // 如保持 2/3 会出现 ruleId=0、ruleType 带前缀控制字符的解码错误。
  int32 ruleId = 3; // Safeline 响应 ruleId 字段；使用 int32 便于 REST JSON 直接以数字呈现；若上游缺失则返回 0 表示未提供。
  string ruleType = 4; // Safeline 响应 ruleType 字段；若上游缺失则返回空字符串表示未提供。
}
