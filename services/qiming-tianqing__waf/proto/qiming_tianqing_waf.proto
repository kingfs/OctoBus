syntax = "proto3";

package Qiming_Tianqing_WAF;

import "google/protobuf/struct.proto";
import "google/protobuf/wrappers.proto";

option go_package = "miner/grpc-service/Qiming_Tianqing_WAF";

service QimingTianqingWafService {
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse);
  rpc UnblockIP(UnblockIPRequest) returns (UnblockIPResponse);
}

enum OperationStatus {
  OPERATION_STATUS_UNSPECIFIED = 0;
  OPERATION_STATUS_SUCCESS = 1;
}

message Credential {
  string base_url = 1;
  string username = 2;
  string password_sha256 = 3;
  google.protobuf.BoolValue skip_tls_verify = 4;
  google.protobuf.Struct extra = 5;
}

message AddressObjectSettings {
  string name = 1;
  string description = 2;
  google.protobuf.Struct template_override = 3;
  google.protobuf.BoolValue disabled = 4;
}

message BlacklistSettings {
  string name = 1;
  string reason = 2;
  google.protobuf.Struct template_override = 3;
}

message UnblockSettings {
  string reason = 1;
  google.protobuf.Struct template_override = 2;
}

message BlockIPRequest {
  repeated string ip_list = 1;
  Credential credential = 2;
  AddressObjectSettings address_object = 3;
  BlacklistSettings blacklist = 4;
  google.protobuf.BoolValue logout = 5;
}

message BlockIPResponse {
  OperationStatus status = 1;
  repeated string blocked_ips = 2;
  string authorization = 3;
  string sid = 4;
}

message UnblockIPRequest {
  repeated string ip_list = 1;
  Credential credential = 2;
  BlacklistSettings blacklist = 3;
  UnblockSettings unblock = 4;
  google.protobuf.BoolValue logout = 5;
}

message UnblockIPResponse {
  OperationStatus status = 1;
  repeated string unblocked_ips = 2;
  string authorization = 3;
  string sid = 4;
}
