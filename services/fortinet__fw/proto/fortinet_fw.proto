syntax = "proto3";

package Fortinet_FW;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/Fortinet_FW";

service Fortinet_FW {
  // 创建地址对象，约定地址对象名与 IP 文本一致。
  rpc CreateAddress(CreateAddressRequest) returns (FortinetResponse) {}
  // 查询地址对象详情，路径参数按对象名等于 IP 的约定传入。
  rpc GetAddress(GetAddressRequest) returns (FortinetResponse) {}
  // 删除地址对象；若设备返回 error=-23，响应仍会保留该业务状态供上层继续处理。
  rpc DeleteAddress(DeleteAddressRequest) returns (FortinetResponse) {}
  // 创建地址组；方法内部会先确保每个成员地址对象存在。
  rpc CreateAddrGroup(CreateAddrGroupRequest) returns (FortinetResponse) {}
  // 查询地址组详情及其成员信息。
  rpc GetAddrGroup(GetAddrGroupRequest) returns (FortinetResponse) {}
  // 向地址组中新增成员；方法内部会先确保目标地址对象存在。
  rpc AddAddrGroupMember(AddAddrGroupMemberRequest) returns (FortinetResponse) {}
  // 从地址组中移除成员；成员不存在的 404 视为幂等成功。
  rpc RemoveAddrGroupMember(RemoveAddrGroupMemberRequest) returns (FortinetResponse) {}
  // 删除地址组本体。
  rpc DeleteAddrGroup(DeleteAddrGroupRequest) returns (FortinetResponse) {}
  // 将动态地址组追加到策略地址组；方法内部会先查询现有成员再更新。
  rpc AttachSubGroupToPolicyAddrGroup(AttachSubGroupToPolicyAddrGroupRequest) returns (FortinetResponse) {}
  // 将动态地址组从策略地址组中移除；方法内部会先查询现有成员再更新。
  rpc DetachSubGroupFromPolicyAddrGroup(DetachSubGroupFromPolicyAddrGroupRequest) returns (FortinetResponse) {}
}

message CreateAddressRequest {
  string ip = 1; // 待创建的 IPv4 地址，同时作为 Fortinet 地址对象名。
  string subnet = 2; // 地址对象的 subnet 字段；为空时脚本自动补为 <ip>/32。
}

message GetAddressRequest {
  string ip = 1; // 待查询的地址对象名，当前约定直接使用 IP 文本。
}

message DeleteAddressRequest {
  string ip = 1; // 待删除的地址对象名，当前约定直接使用 IP 文本。
}

message AddrGroupMember {
  string name = 1; // 地址组成员名；对 IP 地址组场景通常等于已创建的地址对象名。
}

message CreateAddrGroupRequest {
  string group_name = 1; // 待创建的地址组名称。
  repeated string ips = 2; // 需要加入地址组的 IP 列表，脚本会先为每个 IP 创建地址对象。
}

message GetAddrGroupRequest {
  string group_name = 1; // 待查询的地址组名称。
}

message AddAddrGroupMemberRequest {
  string group_name = 1; // 目标地址组名称。
  string ip = 2; // 需要新增到地址组中的 IP，同时作为成员对应的地址对象名。
}

message RemoveAddrGroupMemberRequest {
  string group_name = 1; // 目标地址组名称。
  string ip = 2; // 需要从地址组中移除的 IP，同时作为成员路径参数。
}

message DeleteAddrGroupRequest {
  string group_name = 1; // 待删除的地址组名称。
}

message AttachSubGroupToPolicyAddrGroupRequest {
  string policy_book_name = 1; // 目标策略地址组名称。
  string sub_group_name = 2; // 需要关联到策略地址组中的子地址组名称。
}

message DetachSubGroupFromPolicyAddrGroupRequest {
  string policy_book_name = 1; // 目标策略地址组名称。
  string sub_group_name = 2; // 需要从策略地址组中移除的子地址组名称。
}

message FortinetResponse {
  string status = 1; // Fortinet 原始 status 字段。
  int32 http_status = 2; // Fortinet 原始 http_status 字段。
  int32 error = 3; // Fortinet 原始 error 字段；0 表示未携带或无错误。
  string revision = 4; // Fortinet 原始 revision 字段。
  google.protobuf.Value results = 5; // Fortinet 原始 results 字段，保留其动态结构。
  string raw_json = 6; // 原始 JSON 响应文本，便于排查设备返回语义。
}
