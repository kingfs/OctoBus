syntax = "proto3";

package DPtech_UMC_ADS_v5329;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/DPtech_UMC_ADS_v5329";

// DPtech_UMC_ADS_v5329 exposes DPtech UMC ADS V5.3.29 login and blacklist-related HTTP APIs as unary gRPC methods.
service DPtech_UMC_ADS_v5329 {
  // Login calls POST {host}/UMC/restful/token/getRestfulInterfaceToken with credentials from engine bindings.
  // On success the service caches the returned token for later RPCs under the current engine instance.
  rpc Login(LoginRequest) returns (UmcHttpResponse) {}

  // QueryBlacklist calls POST {host}/UMC/restful/api/getBlackAndWhiteListStrategy.
  // The RPC reuses the cached token from Login and returns the original UMC response without business-level reshaping.
  rpc QueryBlacklist(QueryBlacklistRequest) returns (UmcHttpResponse) {}

  // AddBlacklist calls POST {host}/UMC/restful/api/blackAndWhiteListStrategyConfig with operationType=1.
  // Each provided IP becomes one configParam item; the request accepts 1~100 IPs per RPC.
  rpc AddBlacklist(AddBlacklistRequest) returns (UmcHttpResponse) {}

  // DeleteBlacklist calls POST {host}/UMC/restful/api/blackAndWhiteListStrategyConfig with operationType=3.
  // The service uses the same strategyName rule as AddBlacklist so callers only need to provide IPs.
  rpc DeleteBlacklist(DeleteBlacklistRequest) returns (UmcHttpResponse) {}
}

// LoginRequest is intentionally empty because host/user/password come from instance bindings.
message LoginRequest {}

// QueryBlacklistRequest describes the optional filters for the UMC blacklist query API.
message QueryBlacklistRequest {
  // page is the 1-based page number; values <= 0 are normalized to 1 by the service.
  int32 page = 1;

  // size is the page size; values <= 0 are normalized to 50 by the service.
  int32 size = 2;

  // strategy_name filters by UMC strategy name when provided.
  string strategy_name = 3;

  // ip filters by one exact source IP when provided.
  string ip = 4;

  // Deprecated. Upstream tokens are kept in instance-local session state after Login and are not accepted from RPC requests.
  string token = 5 [deprecated = true];
}

// AddBlacklistRequest contains the IP list that should be added into UMC blacklist strategies.
message AddBlacklistRequest {
  // ips is the non-empty IPv4/IPv6 address list to add; one RPC accepts at most 100 IPs.
  repeated string ips = 1;

  // Deprecated. Upstream tokens are kept in instance-local session state after Login and are not accepted from RPC requests.
  string token = 2 [deprecated = true];
}

// DeleteBlacklistRequest contains the IP list that should be removed from UMC blacklist strategies.
message DeleteBlacklistRequest {
  // ips is the non-empty IPv4/IPv6 address list to delete; one RPC accepts at most 100 IPs.
  repeated string ips = 1;

  // Deprecated. Upstream tokens are kept in instance-local session state after Login and are not accepted from RPC requests.
  string token = 2 [deprecated = true];
}

// UmcHttpResponse carries a sanitized upstream response summary. Login intentionally leaves raw fields empty because the upstream body contains the session token.
message UmcHttpResponse {
  // http_status equals the exact HTTP status code returned by UMC.
  int32 http_status = 1;

  // raw_body preserves the original UMC response body text; empty response bodies become an empty string.
  string raw_body = 2;

  // raw_json carries the parsed JSON structure when raw_body is valid JSON; otherwise it is unset.
  google.protobuf.Value raw_json = 3;
}
