syntax = "proto3";

package Venus_ADS_V36;

option go_package = "miner/grpc-service/Venus_ADS_V36";

// VenusADSBlacklistService wraps Venus ADS V3.6 blacklist login, block, remove, and logout workflows.
service VenusADSBlacklistService {
  rpc BatchBlockIP(BatchBlockIPRequest) returns (BatchBlockIPResponse) {}
  rpc RemoveBlockedIP(RemoveBlockedIPRequest) returns (RemoveBlockedIPResponse) {}
}

message BatchBlockIPRequest {
  repeated string ip_list = 1;
  string request_id = 2;
}

message RemoveBlockedIPRequest {
  string ip = 1;
  string request_id = 2;
}

enum OperationStatus {
  OPERATION_STATUS_UNSPECIFIED = 0;
  OPERATION_STATUS_SUCCESS = 1;
  OPERATION_STATUS_PARTIAL = 2;
  OPERATION_STATUS_FAILED = 3;
}

message BatchBlockIPResponse {
  OperationStatus status = 1;
  int32 requested_ip_count = 2;
  int32 success_count = 3;
  int32 failure_count = 4;
  string upstream_result_code = 5;
  string upstream_message = 6;
  repeated IPTaskResult results = 7;
  string request_id = 8;
}

message RemoveBlockedIPResponse {
  OperationStatus status = 1;
  IPTaskResult result = 2;
  string upstream_result_code = 3;
  string upstream_message = 4;
  string request_id = 5;
}

message IPTaskResult {
  string ip = 1;
  bool succeeded = 2;
  string error_code = 3;
  string error_message = 4;
}
