syntax = "proto3";

package TopSec_FW_2U;

option go_package = "miner/grpc-service/TopSec_FW_2U";

service TopSec_FW_2U {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc ActivatePermission(ActivatePermissionRequest) returns (ActivatePermissionResponse) {}
  rpc AddBlacklistIP(AddBlacklistIPRequest) returns (AddBlacklistIPResponse) {}
  rpc DeleteBlacklistIP(DeleteBlacklistIPRequest) returns (DeleteBlacklistIPResponse) {}
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
}

message SessionContext {
  string token = 1 [deprecated = true];
  string user_mark = 2 [deprecated = true];
  string cookie = 3 [deprecated = true];
  string secret = 4 [deprecated = true];
}

message LoginRequest {
  string host = 1;
  string username = 2 [deprecated = true];
  string password = 3 [deprecated = true];
}

message LoginResponse {
  int32 status_code = 1;
  bool success = 2;
  string message = 3;
}

message ActivatePermissionRequest {
  string host = 1;
  SessionContext session = 2 [deprecated = true];
}

message ActivatePermissionResponse {
  int32 status_code = 1;
  bool success = 2;
  string message = 3;
}

message AddBlacklistIPRequest {
  string host = 1;
  SessionContext session = 2 [deprecated = true];
  repeated string ips = 3;
}

message AddBlacklistIPResponse {
  int32 status_code = 1;
  bool success = 2;
  string message = 3;
}

message DeleteBlacklistIPRequest {
  string host = 1;
  SessionContext session = 2 [deprecated = true];
  repeated string ips = 3;
}

message DeleteBlacklistIPResponse {
  int32 status_code = 1;
  bool success = 2;
  string message = 3;
}

message LogoutRequest {
  string host = 1;
  SessionContext session = 2 [deprecated = true];
}

message LogoutResponse {
  int32 status_code = 1;
  bool success = 2;
  string message = 3;
}
