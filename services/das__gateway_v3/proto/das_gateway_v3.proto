syntax = "proto3";

package DAS_Gateway_V3;

option go_package = "miner/grpc-service/DAS_Gateway_V3";

// 安恒-明御安全网关-V3 (DAS_Gateway_V3) 服务
service DAS_Gateway_V3 {
  // 批量封禁 IP
  // 对应设备 HTTP 接口: POST {host}/api/v3/Objects/Blacklist
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse) {}

  // 单个解封 IP
  // 对应设备 HTTP 接口: DELETE {host}/api/v3/Objects/Blacklist/blist/{unblock_ip}
  rpc UnblockIP(UnblockIPRequest) returns (UnblockIPResponse) {}
}

// 封禁 IP 请求
message BlockIPRequest {
  // 待封禁的 IP 地址列表
  repeated string ips = 1;
}

// 封禁 IP 响应
message BlockIPResponse {
  // 下游 HTTP 状态码
  int32 http_status_code = 1;
  // 下游 HTTP 响应体内容
  string http_response_body = 2;
}

// 解封 IP 请求
message UnblockIPRequest {
  // 待移除的单个 IP 地址
  string ip = 1;
}

// 解封 IP 响应
message UnblockIPResponse {
  // 下游 HTTP 状态码
  int32 http_status_code = 1;
  // 下游 HTTP 响应体内容
  string http_response_body = 2;
}
