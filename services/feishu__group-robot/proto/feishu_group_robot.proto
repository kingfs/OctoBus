syntax = "proto3";

package Feishu_GroupRobot;

option go_package = "miner/grpc-service/Feishu_GroupRobot";

// 飞书群机器人消息推送服务
// 用于通过飞书群机器人 webhook 向指定飞书群推送文本消息
service Feishu_GroupRobot {
  // 发送文本消息
  // 将文本消息通过飞书群机器人 webhook 推送到飞书群
  // HTTP 请求体格式: {"msg_type": "text", "content": {"text": "<message>"}}
  // 成功条件: HTTP 状态码位于 {200, 209, 210} 集合中
  rpc SendTextMessage(SendTextMessageRequest) returns (SendTextMessageResponse) {}
}

// 发送文本消息请求
message SendTextMessageRequest {
  // 待发送的文本内容
  // 映射到飞书 HTTP 请求体中的 content.text 字段
  // 示例: "告警通知: 检测到异常访问"
  string message = 1;
}

// 发送文本消息响应
message SendTextMessageResponse {
  // 下游飞书 HTTP 响应的实际状态码
  // 例如: 200, 209, 210 表示成功
  // 其他状态码表示失败
  int32 http_status = 1;

  // 下游飞书 HTTP 响应体的原始内容
  // 以 JSON 字符串形式保存飞书返回的完整响应
  // 典型响应示例: {"StatusCode": 0, "StatusMessage": "success"}
  // 调用方可从此字段解析飞书返回的业务状态码和消息
  string http_body = 2;
}
