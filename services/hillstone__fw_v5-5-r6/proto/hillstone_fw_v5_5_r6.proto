syntax = "proto3";

package HILLSTONE_FW_V55R6;

option go_package = "miner/grpc-service/HILLSTONE_FW_V55R6";

service HILLSTONE_FW_V55R6 {
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc CreateAddrGroup(CreateAddrGroupRequest) returns (AddrGroupResponse) {}
  rpc UpdateAddrGroup(UpdateAddrGroupRequest) returns (AddrGroupResponse) {}
  rpc QueryAddrGroup(QueryAddrGroupRequest) returns (AddrGroupResponse) {}
}

message HillstoneCookies {
  string fromrootvsys = 1;
  string role = 2;
  string vsysId = 3;
  string token = 4;
  string username = 5;
  string lang = 6;
}

message IpEntry {
  string ip_addr = 1;
  string netmask = 2;
  int32 flag = 3;
}

message AddrGroup {
  string name = 1;
  repeated IpEntry ip = 2;
}

message LoginRequest {
  string lang = 1;
}

message LoginResponse {
  int32 http_status = 1;
  string http_body = 2;
}

message CreateAddrGroupRequest {
  HillstoneCookies cookies = 1;
  repeated AddrGroup addr_groups = 2;
}

message UpdateAddrGroupRequest {
  HillstoneCookies cookies = 1;
  repeated AddrGroup addr_groups = 2;
}

message QueryAddrGroupRequest {
  HillstoneCookies cookies = 1;
  string name = 2;
  int32 limit = 3;
}

message AddrGroupResponse {
  int32 http_status = 1;
  string http_body = 2;
}
