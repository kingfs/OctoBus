syntax = "proto3";

package Chaitin_WAF_SAFELINE;

import "google/protobuf/wrappers.proto";
import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/Chaitin_WAF_SAFELINE";

service Chaitin_WAF_SAFELINE {
  // 按源 IP 聚合攻击检测日志，支持 condition/时间窗/条数限制
  rpc AggregateDetectLogBySrcIP(AggregateDetectLogRequest) returns (AggregateDetectLogResponse) {}

  // 创建 IP 组
  rpc CreateIPGroup(CreateIPGroupRequest) returns (CreateIPGroupResponse) {}

  // 更新 IP 组（name/comment/original 部分字段）
  rpc UpdateIPGroup(UpdateIPGroupRequest) returns (UpdateIPGroupResponse) {}

  // 获取 IP 组列表，支持 name/comment/cidr 过滤与分页
  rpc ListIPGroups(ListIPGroupsRequest) returns (ListIPGroupsResponse) {}

  // 删除 IP 组，可按 id__in 批量或 delete_all_resources 全量
  rpc DeleteIPGroup(DeleteIPGroupRequest) returns (DeleteIPGroupResponse) {}

  // 从 IP 组中删除 IP/IP 段
  rpc DeleteIPGroupItems(DeleteIPGroupItemsRequest) returns (DeleteIPGroupItemsResponse) {}

  // 向 IP 组追加 IP/IP 段
  rpc AddIPGroupItems(AddIPGroupItemsRequest) returns (AddIPGroupItemsResponse) {}

  // 封禁 IP：group_id 优先；缺失时按 group_name 查找，未找到自动创建；随后将 targets 写入该组
  rpc BlockIP(BlockIPRequest) returns (BlockIPResponse) {}

  // 解禁 IP：group_id 优先；缺失时按 group_name 查找，未找到自动创建；随后从组内删除 targets
  rpc UnblockIP(UnblockIPRequest) returns (UnblockIPResponse) {}

  // 获取检测开关状态
  rpc GetDetectorState(GetDetectorStateRequest) returns (GetDetectorStateResponse) {}

  // 修改检测开关
  rpc UpdateDetectorState(UpdateDetectorStateRequest) returns (UpdateDetectorStateResponse) {}
}

message AggregateDetectLogRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  google.protobuf.Int64Value time_interval = 2; // 聚合时间窗（秒），可选，默认 86400，范围 1~86400
  google.protobuf.Int64Value log_size = 3; // 返回条数，可选，默认 100，范围 1~1000
  string condition = 4; // 聚合维度，可选，默认 "src_ip_keyword"；允许：attack_type / rule_id / src_ip_keyword / site_uuid,attack_type,src_ip_keyword
}

message AggregateDetectLogResponse {
  repeated DetectLogAggregateRecord records = 1;
}

message CreateIPGroupRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  string name = 2; // IP 组名称，必填，非空
  string comment = 3; // 备注，可选，默认空字符串
  repeated string original = 4; // IP/网段/范围列表，可选，默认 []
}

message CreateIPGroupResponse {
  string id = 1; // IP 组 ID
  string name = 2; // IP 组名称
  string comment = 3; // IP 组备注
  repeated string original = 4; // 原始 IP 地址列表（Safeline 返回）
  repeated string cidrs = 5; // Safeline 计算后的 CIDR 列表
}

message UpdateIPGroupRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  int64 id = 2; // IP 组 ID，必填
  google.protobuf.StringValue name = 3; // IP 组名称，可选，出现则覆盖（允许空字符串）
  google.protobuf.StringValue comment = 4; // 备注，可选，出现则覆盖（允许空字符串）
  UpdateIPGroupOriginal original = 5; // IP 列表，可选，出现则覆盖（允许空数组表示清空）
}

message UpdateIPGroupOriginal {
  repeated string values = 1; // IP/网段/范围列表，允许空数组
}

message UpdateIPGroupResponse {
  string id = 1; // IP 组 ID
  string name = 2; // IP 组名称
  string comment = 3; // IP 组备注
  repeated string original = 4; // 原始 IP 地址列表
  repeated string cidrs = 5; // Safeline 计算后的 CIDR 列表
}

message ListIPGroupsRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  repeated string name = 2; // 名称筛选，可选，多值为并列匹配
  string cidr = 3; // CIDR/IP 精确匹配，可选
  repeated string comment = 4; // 备注筛选，可选，多值为并列匹配
  google.protobuf.Int64Value count = 5; // 分页大小，可选，>0 启用分页
  google.protobuf.Int64Value offset = 6; // 分页起始偏移，可选，>=0
}

message ListIPGroupsResponse {
  google.protobuf.Value err = 1; // Safeline err 字段，200 且为空表示业务成功
  google.protobuf.Value msg = 2; // Safeline msg 字段，透传，可为空
  ListIPGroupsData data = 3; // Safeline data 字段，含 items/分页信息
}

message ListIPGroupsData {
  repeated IPGroupRecord items = 1; // Safeline data.items / list / items 统一映射
  int64 total = 2; // Safeline data.total，可选
}

message IPGroupRecord {
  int64 id = 1; // IP 组 ID
  string name = 2; // IP 组名称
}

message DeleteIPGroupRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  repeated int64 id__in = 2; // 按 ID 列表删除；与 delete_all_resources 互斥
  bool delete_all_resources = 3; // true 表示删除全部 IP 组
}

message DeleteIPGroupResponse {
  google.protobuf.Value err = 1; // Safeline err 字段，200 且为空表示业务成功
  google.protobuf.Value msg = 2; // Safeline msg 字段，透传，可为空
  google.protobuf.Value data = 3; // Safeline data 字段，透传，包含删除结果详情（如 Safeline 返回）
}

message DeleteIPGroupItemsRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  int64 id = 2; // IP 组 ID，必填
  repeated string targets = 3; // 要删除的 IP/IP 段列表，可选；未提供不发送
}

message DeleteIPGroupItemsResponse {
  google.protobuf.Value err = 1; // Safeline err 字段
  google.protobuf.Value msg = 2; // Safeline msg 字段，透传，可为空
  google.protobuf.Value data = 3; // Safeline data 字段，透传，Safeline 可能返回 null
}

message AddIPGroupItemsRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  int64 id = 2; // IP 组 ID，必填
  repeated string targets = 3; // 待追加的 IP/IP 段列表，可选；未提供不发送；允许空数组和重复
}

message AddIPGroupItemsResponse {
  google.protobuf.Value err = 1; // err 字段
  google.protobuf.Value msg = 2; // msg 字段
  AddIPGroupItemsData data = 3; // data 字段，含 IP 组详情
}

message BlockIPRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  int64 group_id = 2; // IP 组 ID，可选，优先使用
  string group_name = 3; // IP 组名称，可选，用于查找/创建；缺省默认 block_ip
  string comment = 4; // 备注，可选，仅在创建新组时使用
  repeated string targets = 5; // 待封禁的 IP/IP 段，必填且非空
}

message BlockIPResponse {
  google.protobuf.Value err = 1; // err 字段
  google.protobuf.Value msg = 2; // msg 字段
  AddIPGroupItemsData data = 3; // data 字段，包含最新组详情
}

message UnblockIPRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  int64 group_id = 2; // IP 组 ID，可选，优先使用
  string group_name = 3; // IP 组名称，可选，用于查找/创建；缺省默认 block_ip
  repeated string targets = 4; // 待解禁的 IP/IP 段，必填且非空
}

message UnblockIPResponse {
  google.protobuf.Value err = 1; // err 字段
  google.protobuf.Value msg = 2; // msg 字段
  google.protobuf.Value data = 3; // data 字段，DELETE 可能返回 null
}

message AddIPGroupItemsData {
  int64 id = 1; // IP 组 ID，与请求/Safeline 返回一致
  string name = 2; // IP 组名称
  string comment = 3; // IP 组备注
  repeated string original = 4; // Safeline original 字段
  repeated string cidrs = 5; // Safeline cidrs 字段
}

message GetDetectorStateRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
}

message GetDetectorStateResponse {
  google.protobuf.Value err = 1; // Safeline err 字段，200 且为空表示业务成功
  google.protobuf.Value msg = 2; // Safeline msg 字段，透传
  DetectorStateData data = 3; // Safeline data 字段，至少包含 is_enabled
}

message DetectorStateData {
  bool is_enabled = 1; // 当前检测是否启用
  google.protobuf.Struct raw = 2; // Safeline data 字段原样透传，便于保留额外字段
}

message UpdateDetectorStateRequest {
  string api_token = 1 [deprecated = true]; // 访问凭证，必填
  bool is_enabled = 2; // 是否启用检测，必填布尔值，true 启用 / false 停用
}

message UpdateDetectorStateResponse {
  google.protobuf.Value err = 1; // Safeline err 字段，200 且为空表示业务成功
  google.protobuf.Value msg = 2; // Safeline msg 字段，透传，可为空
  google.protobuf.Value data = 3; // Safeline data 字段，透传，Safeline 当前可能返回 null
}

message DetectLogAggregateRecord {
  string event_id = 1; // Event ID
  string country = 2; // 国家和地区
  string province = 3; // 省份
  string src_ip = 4; // 源 IP
  string dst_port = 5; // 目的端口
  string attack_type = 6; // 攻击类型
  string method = 7; // 请求方法
  string website = 8; // URL 地址
  string website_name = 9; // 防护站点名称
  string module = 10; // 相关模块
  string timestamp = 11; // 时间
  string scheme = 12; // 协议
  string dst_ip = 13; // 目的 IP
  string url_path = 14; // URL 路径
  string risk_level = 15; // 风险等级
  string status_code = 16; // 响应码
  string risk_level_num = 17; // 风险等级标志
  string action = 18; // 执行动作
  string reason = 19; // 原因
  string payload = 20; // payload
  string socket_ip = 21; // Socket IP
  string threat_confidence = 22; // 威胁情报 IP 置信度
  string threat_risk_level = 23; // 威胁情报 IP 威胁等级
  string threat_last_timestamp = 24; // 威胁情报 IP 最近发现时间
  string matched_threat_tag = 25; // 威胁情报 IP 命中标签
  string flag = 26; // 标记
  string count = 27; // 日志总数，保留为字符串以避免语义歧义
}
