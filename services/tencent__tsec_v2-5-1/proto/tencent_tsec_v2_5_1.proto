syntax = "proto3";

package Tencent_TSec_V251;

import "google/protobuf/struct.proto";

option go_package = "miner/grpc-service/Tencent_TSec_V251";

service Tencent_TSec_V251 {
  rpc AddPreciseBlack(AddPreciseBlackRequest) returns (AddPreciseBlackResponse) {}
  rpc DeletePreciseBlack(DeletePreciseBlackRequest) returns (DeletePreciseBlackResponse) {}
  rpc AddGlobalBlack(AddGlobalBlackRequest) returns (AddGlobalBlackResponse) {}
  rpc DeleteGlobalBlack(DeleteGlobalBlackRequest) returns (DeleteGlobalBlackResponse) {}
}

message AddPreciseBlackRequest {
  string ip = 1;
  int64 valid_duration = 2;
  int32 ban_reason = 3;
  string field = 4;
  string operator = 5;
  int32 threshold = 6;
}

message AddPreciseBlackResponse {
  google.protobuf.Value err = 1;
  google.protobuf.Value msg = 2;
  google.protobuf.Value data = 3;
}

message DeletePreciseBlackRequest {
  string ip = 1;
  string field = 2;
  string operator = 3;
}

message DeletePreciseBlackResponse {
  google.protobuf.Value err = 1;
  google.protobuf.Value msg = 2;
  google.protobuf.Value data = 3;
}

message AddGlobalBlackRequest {
  string ip_src = 1;
  int64 valid_duration = 2;
  int32 ban_reason = 3;
  string ip_dst = 4;
  int32 threshold = 5;
}

message AddGlobalBlackResponse {
  google.protobuf.Value err = 1;
  google.protobuf.Value msg = 2;
  google.protobuf.Value data = 3;
}

message DeleteGlobalBlackRequest {
  string ip_src = 1;
  string ip_dst = 2;
}

message DeleteGlobalBlackResponse {
  google.protobuf.Value err = 1;
  google.protobuf.Value msg = 2;
  google.protobuf.Value data = 3;
}
